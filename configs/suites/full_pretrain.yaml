suite_name: full_pretrain
shared_config: configs/base.yaml

experiments:

  - name: adamw
    overrides:
      optimizer:
        name: adamw
      analysis:
        enable_scaling_trace: true

  - name: elementwise
    overrides:
      optimizer:
        name: elementwise
      analysis:
        enable_scaling_trace: true

  - name: channelwise
    overrides:
      optimizer:
        name: channelwise
        granularity: channel
        scale: 1.0
      analysis:
        enable_scaling_trace: true

  - name: tensorwise
    overrides:
      optimizer:
        name: tensorwise
        granularity: tensor
        scale: 1.0
      analysis:
        enable_scaling_trace: true

  - name: channelwise_nl
    overrides:
      optimizer:
        name: channelwise_nl
        granularity: channel
        scale: 1.0
        norm_limiter: true
      analysis:
        enable_scaling_trace: true

  - name: grouped_rowwise_k2
    overrides:
      optimizer:
        name: grouped_rowwise_k2
        granularity: grouped_rowwise
        num_groups: 2
        scale: 1.0
      analysis:
        enable_scaling_trace: true

  - name: grouped_rowwise_k4
    overrides:
      optimizer:
        name: grouped_rowwise_k4
        granularity: grouped_rowwise
        num_groups: 4
        scale: 1.0
      analysis:
        enable_scaling_trace: true

  - name: apollo_rank_1_4
    overrides:
      optimizer:
        name: apollo
        rank_ratio: 0.25
        granularity: channel
        projection: random
        scale: 1.0
      analysis:
        enable_scaling_trace: true

  - name: apollo_rank_1_8
    overrides:
      optimizer:
        name: apollo
        rank_ratio: 0.125
        granularity: channel
        projection: random
        scale: 1.0
      analysis:
        enable_scaling_trace: true

  - name: apollo_mini
    overrides:
      optimizer:
        name: apollo_mini
        rank: 1
        granularity: tensor
        projection: random
        scale: 128.0
      analysis:
        enable_scaling_trace: true

  - name: apollo_svd
    overrides:
      optimizer:
        name: apollo
        rank_ratio: 0.25
        granularity: channel
        projection: svd
        scale: 1.0
      analysis:
        enable_scaling_trace: true
