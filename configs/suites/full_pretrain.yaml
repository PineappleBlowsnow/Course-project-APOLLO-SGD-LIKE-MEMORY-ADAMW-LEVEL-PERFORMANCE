suite_name: full_pretrain
shared_config: configs/base.yaml

experiments:
  - name: sgd_momentum
    overrides:
      optimizer:
        name: sgd
      analysis:
        enable_scaling_trace: false

  - name: adamw
    overrides:
      optimizer:
        name: adamw
      analysis:
        enable_scaling_trace: true

  - name: galore_rank_1_4
    overrides:
      optimizer:
        name: galore
        rank_ratio: 0.25

  - name: galore_rank_1_8
    overrides:
      optimizer:
        name: galore
        rank_ratio: 0.125

  - name: apollo_rank_1_4
    overrides:
      optimizer:
        name: apollo
        rank_ratio: 0.25
        granularity: channel
        scale: 1.0
      analysis:
        enable_scaling_trace: true

  - name: apollo_rank_1_8
    overrides:
      optimizer:
        name: apollo
        rank_ratio: 0.125
        granularity: channel
        scale: 1.0
      analysis:
        enable_scaling_trace: true

  - name: apollo_mini
    overrides:
      optimizer:
        name: apollo_mini
        rank: 1
        granularity: tensor
        scale: 64.0

