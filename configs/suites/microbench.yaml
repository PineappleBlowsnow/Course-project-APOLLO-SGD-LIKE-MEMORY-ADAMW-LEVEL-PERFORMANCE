suite_name: microbench
shared_config: configs/base.yaml

experiments:
  - name: adamw_bench
    overrides:
      run_kind: benchmark
      analysis:
        enable_memory_profile: true
      benchmark:
        enabled: true
      optimizer:
        name: adamw

  - name: galore_rank_1_4_bench
    overrides:
      run_kind: benchmark
      analysis:
        enable_memory_profile: true
      benchmark:
        enabled: true
      optimizer:
        name: galore
        rank_ratio: 0.25

  - name: apollo_rank_1_4_bench
    overrides:
      run_kind: benchmark
      analysis:
        enable_memory_profile: true
      benchmark:
        enabled: true
      optimizer:
        name: apollo
        rank_ratio: 0.25

  - name: apollo_mini_bench
    overrides:
      run_kind: benchmark
      analysis:
        enable_memory_profile: true
      benchmark:
        enabled: true
      optimizer:
        name: apollo_mini
        rank: 1
        scale: 64.0

